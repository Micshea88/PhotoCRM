name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.10.0
  # CI test secrets — high-entropy random hex so the production-grade-secret
  # refusal in src/lib/env.ts doesn't trip during the `next build` step
  # (which forces NODE_ENV=production internally).
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/pathway_test
  BETTER_AUTH_SECRET: 7f3c2d1e8a9b4f5e6d7c8b9a1f2e3d4c5b6a7f8e9d0c1b2a3f4e5d6c7b8a9f0e
  BETTER_AUTH_URL: http://localhost:3000
  RESEND_API_KEY: re_ci_placeholder_key
  RESEND_FROM_EMAIL: noreply@example.com
  BLOB_READ_WRITE_TOKEN: vercel_blob_ci_placeholder
  CRON_SECRET: ad8f4c9e2b1d6a5f8e3c7b9d4a2f6e1c8b5d3a7f
  QUEUE_SECRET: 9c8b7a6f5e4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b
  SENTRY_DSN: ""
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  verify:
    name: Verify (typecheck, lint, unit, integration, build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pathway_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply database migrations
        run: pnpm db:migrate
      - name: Check for schema drift
        run: pnpm db:check
      - run: pnpm verify --tier=2

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pathway_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply database migrations
        run: pnpm db:migrate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
