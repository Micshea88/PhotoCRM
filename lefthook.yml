# Tier 1 = pre-commit (fast, only staged)
# Tier 2 = pre-push (full local check, mirrors CI minus E2E)

pre-commit:
  parallel: false
  commands:
    typecheck:
      run: pnpm typecheck
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm exec eslint --fix {staged_files} && git add {staged_files}
    format:
      glob: "*.{ts,tsx,js,jsx,json,md,css}"
      run: pnpm exec prettier --write {staged_files} && git add {staged_files}
    test-unit:
      run: pnpm test:unit

pre-push:
  parallel: false
  commands:
    verify:
      run: pnpm verify --tier=2
